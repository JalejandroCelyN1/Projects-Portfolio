  <text x="845" y="445" fill="#FFD8EC" font-family="Segoe UI, sans-serif" font-size="16">H13: sesgo de mercado</text>
  <text x="845" y="468" fill="#FFD8EC" font-family="Segoe UI, sans-serif" font-size="16">domina en dias extremos</text>

  <text x="95" y="612" fill="#F8C9E0" font-family="Segoe UI, sans-serif" font-size="18">Visual simulado inspirado en el notebook de Taller 2</text>
