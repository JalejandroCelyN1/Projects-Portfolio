  </defs>

  <rect width="1200" height="700" fill="url(#bg3)"/>
  <rect x="50" y="50" width="1100" height="600" rx="30" fill="#2D1524" stroke="#F286B9" stroke-opacity="0.35"/>

  <text x="95" y="92" fill="#FFE6F2" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">Proyecto 3 - NYSE Bull vs Bear</text>

  <rect x="90" y="130" width="1020" height="500" rx="20" fill="#371B2C"/>

  <line x1="140" y1="540" x2="760" y2="540" stroke="#DFA9C8"/>
  <line x1="140" y1="210" x2="140" y2="540" stroke="#DFA9C8"/>

  <rect x="180" y="300" width="45" height="240" rx="8" fill="url(#bull)"/>
  <rect x="245" y="350" width="45" height="190" rx="8" fill="url(#bear)"/>
